name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          # Cover Windows on the newest supported Python only, to keep CI fast
          # while still catching path-separator and dotfile regressions.
          - python-version: "3.12"
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests

      - name: ruff format --check
        run: ruff format --check src tests

      - name: pytest
        run: pytest -q

      - name: End-to-end smoke test (lint the bundled demo)
        run: lgrlw lint examples/demo_direction
